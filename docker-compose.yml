services:
  piclist:
    image: kuingsmile/piclist:latest
    container_name: piclist
    ports:
      - "36677:36677"
    environment:
      - TZ=Asia/Shanghai
    volumes:
      - type: bind
        source: 'C:\Users\hewqb\Documents\Obsidian Vault\Personal_Wiki'
        target: /vault
    command:
      - sh
      - -lc
      - |
        mkdir -p /root/.piclist
        cat > /root/.piclist/config.json <<'EOF'
        {
          "picBed": {
            "uploader": "local",
            "current": "local",
            "transformer": "path",
            "local": {
              "path": "/vault/Clippings/_assets",
              "customUrl": "",
              "webPath": "/vault/Clippings/_assets"
            }
          },
          "picgoPlugins": {}
        }
        EOF
        cat > /root/.piclist/package.json <<'EOF'
        {"name":"picgo-plugins","description":"picgo-plugins","repository":"https://github.com/Kuingsmile/PicList-Core","license":"MIT"}
        EOF
        exec node /usr/local/bin/picgo-server -k 5331296d13514e479754f25671b08cef
    restart: unless-stopped

  app:
    build: .
    image: obsidian-clip-api-app:latest
    container_name: obsidian-clip-api
    ports:
      - "18001:8901"
    volumes:
      - ./app:/app/app:ro
      - ./config.yaml:/app/config.yaml:ro
      - ./logs:/app/logs
    environment:
      - TZ=Asia/Shanghai
      - CONFIG_PATH=/app/config.yaml
    depends_on:
      - piclist
    restart: unless-stopped
